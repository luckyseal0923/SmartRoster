<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>SmartRoster｜智慧班表簽核系統</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --primary:#374151;      /* 石墨灰 */
  --accent:#059669;       /* 醫療綠 */
  --bg:#eef2f0;           /* 淡背景 */
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --ok:#059669;
  --warn:#b45309;
  --bad:#b91c1c;
}
  
body{
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:32px;
}

.container{max-width:1200px;margin:auto;}

header{margin-bottom:32px;}
header h1{margin:0;font-size:30px;}
header p{margin-top:6px;color:var(--muted);}

.card{
  background:var(--card);
  border-radius:16px;
  padding:28px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
  margin-bottom:32px;
}

h3{margin-top:0;}

/* ===== 表單 ===== */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px 20px;
}

label{
  font-size:13px;
  color:var(--muted);
  margin-bottom:4px;
  display:block;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:14px;
}

.upload-box{
  margin-top:16px;
  border:2px dashed var(--border);
  border-radius:14px;
  padding:24px;
  text-align:center;
  background:#fafafa;
}

/* ===== 按鈕 ===== */
.actions{
  display:flex;
  gap:16px;
  margin-top:24px;
}

button{
  padding:14px 20px;
  border-radius:12px;
  border:none;
  font-size:15px;
  cursor:pointer;
}

button.primary{background:var(--primary);color:#fff;}
button.accent{background:var(--accent);color:#fff;}
button:disabled{opacity:.5;cursor:not-allowed;}
  button.secondary{
  background:#f3f4f6;
  color:#374151;
  border:1px solid #d1d5db;
}

button.secondary:hover{
  background:#e5e7eb;
}

/* ===== 任務清單 table ===== */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px 12px;
  border-bottom:1px solid var(--border);
  font-size:14px;
  text-align:left;
}

th{color:var(--muted);font-weight:600;}

.progress{
  background:#e5e7eb;
  border-radius:999px;
  height:10px;
  overflow:hidden;
  margin-bottom:6px;
}

.progress-bar{
  background:var(--accent);
  height:100%;
}

.copy{cursor:pointer;font-size:18px;}

/* ===== Modal ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  border-radius:16px;
  padding:28px;
  width:440px;
  max-height:85vh;        /* ✅ 新增 */
  overflow:hidden;        /* ✅ 新增 */
}

.status-ok{color:var(--ok);}
.status-warn{color:var(--warn);}
.status-bad{color:var(--bad);
           }
  .file-btn{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#f9fafb;
  cursor:pointer;
  font-size:14px;
}

.file-btn:hover{
  background:#eef2f7;
}
</style>
</head>

<body>
<body>
<div class="container">
    <header>
        <h1>SmartRoster</h1>
        <p>智慧班表簽核系統</p>
    </header>

    <div class="card">
        <h3>📌 建立新簽核任務</h3>
        <div class="form-grid">
            <div><label>任務建立者</label><input id="creator"></div>
            <div><label>員工編號</label><input id="staffId"></div>
            <div><label>單位別</label><input id="unit"></div>
            <div><label>簽核月份</label><input id="month" type="month"></div>
            <div><label>設定密碼（至少 6 碼）</label><input id="password" type="password"></div>
        </div>

        <div class="upload-box">
            <div style="font-size:18px;margin-bottom:8px;">📁 <strong>上傳班表 Excel</strong></div>
            <p style="color:var(--muted);margin-bottom:12px;">用於辨識待簽核人數</p>
            <div id="filePicker" style="display:flex;align-items:center;gap:10px;">
                <label for="fileInput" class="file-btn">⬆ 選擇檔案</label>
                <span id="fileName" style="color:#374151;"></span>
                <button id="clearFileBtn" onclick="clearFile()" style="display:none;border:none;background:none;color:#b91c1c;cursor:pointer;font-size:18px;">✖</button>
            </div>
            <input id="fileInput" type="file" accept=".xlsx,.xls" style="display:none;">
        </div>

        <div class="actions">
            <button class="accent" onclick="runCheck()">🔍 查核任務辨識</button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3>📊 任務清單</h3>
            <div style="display: flex; gap: 8px;">
                <input id="taskSearch" placeholder="搜尋建立者、單位、月份..." style="width: 250px; padding: 6px 12px; border-radius: 8px;">
            </div>
        </div>
        <table>
            <thead>
                <tr id="taskTableHeader">
                    <th style="cursor:pointer;" onclick="setSort('created_at')">任務編碼 / 時間 ↕</th>
                    <th style="cursor:pointer;" onclick="setSort('creator')">建立者 ↕</th>
                    <th style="cursor:pointer;" onclick="setSort('unit')">單位 ↕</th>
                    <th style="cursor:pointer;" onclick="setSort('month')">月份 ↕</th>
                    <th style="cursor:pointer;" onclick="setSort('progress')">完成度 ↕</th>
                    <th>功能</th>
                </tr>
            </thead>
            <tbody id="taskTableBody">
                <tr><td colspan="6" style="text-align:center;">載入中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h3>🔍 任務辨識結果</h3>
        <div id="checkContent"></div>
        <div id="signerList" style="margin-top:16px;"></div>
        <hr style="margin:20px 0;">
        <h4>➕ 手動補登簽核人</h4>
        <div style="display:flex;gap:8px;">
            <input id="manualStaffId" placeholder="員工編號">
            <input id="manualName" placeholder="姓名（選填）">
            <button onclick="addManualSigner()">新增</button>
        </div>
        <ul id="manualList" style="margin-top:10px;"></ul>
        <br>
        <div style="display:flex;justify-content:flex-end;gap:12px;">
            <button class="secondary" onclick="cancelCreate()">取消</button>
            <button id="createBtn" class="primary" onclick="confirmCreate()">建立任務</button>
        </div>
    </div>
</div>

<div class="modal" id="successModal" style="display: none; align-items: center; justify-content: center;">
    <div class="modal-box" style="width: 500px; text-align: center;">
        <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
        <h3 style="color: var(--accent); margin-bottom: 20px;">任務建立完成！</h3>
        <div style="background: #f9fafb; border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: left; margin-bottom: 24px;">
            <p style="margin: 0 0 10px 0; font-weight: 600; font-size: 15px;">【SmartRoster 班表確認通知】</p>
            <p id="shareText" style="margin: 0; font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: var(--primary);"></p>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="accent" onclick="copyShareText()" style="width: 100%;">📋 複製通知訊息並關閉</button>
            <button class="secondary" onclick="closeSuccessModal()" style="width: 100%;">僅關閉視窗</button>
        </div>
    </div>
</div>

<div class="modal" id="authModal" style="display: none; align-items: center; justify-content: center;">
    <div class="modal-box" style="width: 350px;">
        <h3 style="text-align: center;">🔐 報表檢視驗證</h3>
        <p style="font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 20px;">請輸入建立者員編與任務密碼</p>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <div>
                <label>管理員員編 (帳號)</label>
                <input id="auth_user" placeholder="請輸入員編">
            </div>
            <div>
                <label>任務密碼</label>
                <input id="auth_pwd" type="password" placeholder="請輸入 6 位數密碼">
            </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 24px;">
            <button class="secondary" onclick="closeAuthModal()" style="flex: 1;">取消</button>
            <button class="accent" id="confirmAuthBtn" style="flex: 1;">送出驗證</button>
        </div>
    </div>
</div>
  
</body>
</html>
