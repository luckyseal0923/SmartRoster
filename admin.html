<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>SmartRoster Admin｜後台管理系統</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --primary:#1e293b;      /* Admin 主色 */
  --accent:#2563eb;       /* Admin 主操作色 */
  --accent-hover:#1d4ed8;

  --bg:#f3f6fb;           /* Admin 背景 */
  --card:#ffffff;

  --text:#0f172a;
  --muted:#64748b;

  --border:#e2e8f0;

  --ok:#059669;
  --bad:#dc2626;
}

*{box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:32px;
}

/* 置頂資訊看板樣式 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 24px;
}

.stats-card {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
  border-left: 5px solid var(--primary); /* 左側強調線 */
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.stats-label {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 6px;
  font-weight: 500;
}

.stats-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
}

.stats-sublabel {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* 響應式：手機版改為兩列 */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
}
  
.container{
  max-width:1400px;
  margin:auto;
}

header{
  margin-bottom:24px;
}

header h1{
  color:#1e293b;
}

header p{
  color:#64748b;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
  margin-bottom:24px;
}

h3,h4{
  margin-top:0;
}

/* ===== 工具列 ===== */
.toolbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:18px;
}

.toolbar-left{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

.toolbar-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
}

input[type="text"], select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:14px;
  min-width:220px;
  background:#fff;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  font-size:14px;
  cursor:pointer;
}

button.primary{
  background:var(--primary);
  color:#fff;
}

button.accent{
  background:#2563eb;
}

button.accent:hover{
  background:#1d4ed8;
}

button.secondary{
  background:#f3f4f6;
  color:#374151;
  border:1px solid #d1d5db;
}

button.danger{
  background:var(--bad);
  color:#fff;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* ===== 月份標籤 ===== */
.month-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:flex-end;
}

.month-tag{
  padding:5px 10px;
  border-radius:999px;
  background:#f3f4f6;
  border:1px solid #d1d5db;
  font-size:12px;
  cursor:pointer;
  white-space:nowrap;
}

.month-tag.active{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}

/* ===== 提示列 ===== */
.info-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:16px;
}

.info-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 12px;
  border-radius:999px;
  background:#f9fafb;
  border:1px solid var(--border);
  font-size:13px;
  color:#374151;
}

  /* ===== Table Actions ===== */
.table-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.action-right{
  display:flex;
  gap:10px;
}
/* ===== table ===== */
/* ===== table ===== */
.table-wrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius:14px;
}

table{
  width:100%;
  border-collapse:collapse;
}

/* ===== table hover ===== */
.table-wrap table tbody tr:hover{
  background:#f1f5f9;
}
th,td{
  padding:14px 12px;
  border-bottom:1px solid var(--border);
  font-size:14px;
  text-align:left;
  vertical-align:middle;
}

th{
  color:var(--muted);
  font-weight:600;
  background:#fafafa;
  position:sticky;
  top:0;
  z-index:1;
}

tr:hover td{
  background:#fcfcfc;
}

.check-col{
  width:48px;
  text-align:center;
}

.task-meta-time{
  font-size:12px;
  font-weight:600;
  color:#065f46;
  background:#ecfdf5;
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  margin-bottom:6px;
}

.task-meta-id{
  font-size:12px;
  color:#6b7280;
}

.progress{
  background:#e5e7eb;
  border-radius:999px;
  height:12px;
  overflow:hidden;
  margin-bottom:6px;
  width:110px;
}

.progress-bar{
  background:var(--accent);
  height:100%;
  transition:width .4s ease;
}

.row-actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.row-actions button{
  padding:4px 8px;
  font-size:12px;
}

.status-badge{
  display:inline-block;
  font-size:12px;
  padding:4px 8px;
  border-radius:999px;
  font-weight:600;
}

.status-pending{
  background:#f3f4f6;
  color:#4b5563;
}

.status-progress{
  background:#ecfdf5;
  color:#065f46;
}

.status-done{
  background:#eff6ff;
  color:#1d4ed8;
}

.status-expired{
  background:#fef2f2;
  color:#991b1b;
}

/* ===== Modal ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal-box{
  background:#fff;
  border-radius:16px;
  width:min(1000px,92vw);
  max-height:88vh;
  overflow:hidden;
  box-shadow:0 18px 40px rgba(0,0,0,.18);
}

.modal-header{
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
}

.modal-body{
  padding:20px 22px;
  overflow:auto;
  max-height:calc(88vh - 70px);
}

.close-btn{
  background:#f3f4f6;
  color:#374151;
  border:1px solid #d1d5db;
  padding:8px 12px;
  border-radius:10px;
}

.muted{
  color:var(--muted);
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:28px 12px;
}

/* ===== 明細表 ===== */
.detail-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}

.detail-card{
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  background:#f9fafb;
}

.detail-card .label{
  font-size:11px;
  color:#6b7280;
  margin-bottom:2px;
}

.detail-card .value{
  font-size:14px;
  font-weight:600;
}

.small-note{
  margin-top:10px;
  font-size:12px;
  color:#92400e;
  background:#fffbeb;
  border:1px solid #fde68a;
  padding:10px 12px;
  border-radius:10px;
}

/* ===== 響應式 ===== */
@media (max-width: 900px){
  body{
    padding:16px;
  }

  .toolbar{
    flex-direction:column;
    align-items:stretch;
  }

  .toolbar-left,
  .toolbar-right{
    width:100%;
    align-items:stretch;
  }

  .month-tags{
    justify-content:flex-start;
  }

  .detail-grid{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>
<div class="container">

<header>
  <h1>SmartRoster Admin</h1>
  <p>智慧班表簽核系統｜後台管理</p>
</header>
<div class="stats-grid">
  <div class="stats-card">
    <div class="stats-label">累計起單總數</div>
    <div id="statTotal" class="stats-value">0</div>
  </div>
  <div class="stats-card">
    <div class="stats-label">應簽核總人次</div>
    <div id="statSigners" class="stats-value">0</div>
  </div>
  <div class="stats-card">
    <div class="stats-label">全案總達成率</div>
    <div id="statTotalRate" class="stats-value" style="color:var(--ok);">0%</div>
  </div>
  <div class="stats-card">
    <div class="stats-label">數位行政效率</div>
    <div id="statEfficiency" class="stats-value" style="color:var(--info);">0%</div>
    <div class="stats-sublabel">24小時達成率 > 80% 任務比</div>
  </div>
</div>

<div class="card">
  <div class="toolbar">
    <div class="toolbar-left">
      <input id="searchInput" type="text" placeholder="搜尋任務ID、建立者、單位、月份..." />
      <select id="statusFilter">
        <option value="all">全部狀態</option>
        <option value="pending">未開始</option>
        <option value="progress">進行中</option>
        <option value="done">已完成</option>
      </select>
      <button class="secondary" onclick="refreshTasks()">重新整理</button>
    </div>

<div class="month-tags">

  <div id="allMonthTag"
       class="month-tag active"
       onclick="setMonthFilter('all')">
    全部
  </div>

  <!-- 最近月份 -->
  <div id="recentMonths" style="display:flex;gap:6px;"></div>

  <!-- 更多月份 -->
  <select id="monthDropdown"
          onchange="setMonthFilter(this.value)"
          style="padding:5px 10px;border-radius:999px;border:1px solid #d1d5db;">
    <option value="">更多月份</option>
  </select>

</div>
  </div>

<div class="table-actions">

  <div class="action-left">
    <span style="font-size:13px;color:#6b7280;">批次操作</span>
  </div>

  <div class="action-right">

    <button id="mainDownloadBtn" class="accent" onclick="handleDownload()">
      📥 下載簽核紀錄
    </button>

    <button id="rosterDownloadBtn" class="primary" onclick="handleRosterDownload()">
      📅 下載當月班表
    </button>

  </div>

</div>

  <div class="table-wrap" style="margin-top:16px;">
    <table>
      <thead>
        <tr>
          <th class="check-col">
            <input type="checkbox" id="checkAll" onclick="toggleAllRows(this)">
          </th>
          <th>任務編碼 / 建立時間</th>
          <th>建立者</th>
          <th>單位</th>
          <th>簽核月份</th>
          <th>狀態</th>
          <th>完成度</th>
          <th>功能</th>
        </tr>
      </thead>
      <tbody id="taskTableBody">
        <tr><td colspan="8" class="empty">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

</div>

<!-- ===== 任務明細 Modal ===== -->
<div class="modal" id="detailModal">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <h3 style="margin:0;">📋 任務簽核內容</h3>
        <div id="detailTitle" class="muted" style="margin-top:4px;font-size:13px;"></div>
      </div>
      <button class="close-btn" onclick="closeDetailModal()">關閉</button>
    </div>

    <div class="modal-body">
      <div id="detailSummary"></div>
      <div class="table-wrap" style="margin-top:16px;">
        <table>
          <thead>
            <tr>
              <th>員工編號</th>
              <th>姓名</th>
              <th>簽核狀態</th>
              <th>簽核時間</th>
            </tr>
          </thead>
          <tbody id="detailBody">
            <tr><td colspan="5" class="empty">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  /* =========================
   1. 核心數據計算與 UI 更新
========================= */
function updateUIStats() {
  const ids = getSelectedTaskIds();
  const count = ids.length;

  // --- 更新按鈕文字 ---
  const btnReport = document.getElementById("mainDownloadBtn");
  const btnRoster = document.getElementById("rosterDownloadBtn");
  
  if (count === 0) {
    btnReport.innerText = "📥 下載簽核紀錄";
    btnRoster.innerText = "📅 下載當月班表";
  } else if (count === 1) {
    btnReport.innerText = "📥 下載簽核紀錄 (單筆)";
    btnRoster.innerText = "📅 下載當月班表 (單筆)";
  } else {
    btnReport.innerText = `📥 批次下載簽核紀錄 (${count} 筆)`;
    btnRoster.innerText = `📥 批次下載當月班表 (${count} 筆)`;
  }

  // --- 計算置頂看板 (永遠顯示系統總數) ---
  const totalTasks = allTasks.length;
  // 加總應簽人次與已簽人次
  const totalSigners = allTasks.reduce((acc, t) => acc + Number(t.signer_count || 0), 0);
  const totalSigned = allTasks.reduce((acc, t) => acc + Number(t.signed_count || 0), 0);
  // 計算 24hr 達成率 > 80% 的任務數
  const highEffTasks = allTasks.filter(t => Number(t.progress || 0) >= 80).length;

  document.getElementById("statTotal").innerText = totalTasks;
  document.getElementById("statSigners").innerText = totalSigners;
  document.getElementById("statTotalRate").innerText = totalSigners > 0 
    ? Math.round((totalSigned / totalSigners) * 100) + "%" : "0%";
  document.getElementById("statEfficiency").innerText = totalTasks > 0 
    ? Math.round((highEffTasks / totalTasks) * 100) + "%" : "0%";
}

/* =========================
   2. 下載處理邏輯
========================= */
function handleDownload() {
  const ids = getSelectedTaskIds();
  if (ids.length === 0) return alert("請先勾選任務");
  
  if (ids.length === 1) {
    openReport(ids[0]);
  } else {
    downloadSelectedReports();
  }
}

function handleRosterDownload() {
  const ids = getSelectedTaskIds();
  if (ids.length === 0) return alert("請先勾選任務");
  
  ids.forEach(id => {
    // 假設班表導出 API 為 roster-export
    window.open(`https://chihwei-n8n.zeabur.app/webhook/roster-export?task_id=${encodeURIComponent(id)}`, "_blank");
  });
}

/* =========================
   3. 修改原本的 renderTasks 與 updateSelectedCount
========================= */


// 在 renderTasks 函式內，記得在末尾調用 updateUIStats() 確保看板同步
function renderTasks() {
  // ... 前方的過濾與排序邏輯 ...
  
  // 記得修改內部的 tr.innerHTML：
  // 移除 <button class="secondary" onclick="openReport(...)">報表</button>
  
  updateUIStats(); 
}
/* =========================
   API 設定
========================= */
const API_LIST = "https://chihwei-n8n.zeabur.app/webhook/roster-list";
const API_REPORT = "https://chihwei-n8n.zeabur.app/webhook/admin-roster-report";
const API_DELETE = "https://chihwei-n8n.zeabur.app/webhook/roster-delete";       // 需後端配合
const API_DETAIL = "https://chihwei-n8n.zeabur.app/webhook/roster-task-detail";   // 需後端配合
const API_BATCH_EXPORT = "https://chihwei-n8n.zeabur.app/webhook/admin-roster-report"; // 可選，若無則 fallback 多分頁
const API_CLOSE = "https://chihwei-n8n.zeabur.app/webhook/roster-close";
const API_REOPEN = "https://chihwei-n8n.zeabur.app/webhook/roster-reopen";
/* =========================
   全域狀態
========================= */
let allTasks = [];
let monthFilter = "all";
let recentMonths = [];
let currentKeyword = "";
let currentStatus = "all";

/* =========================
   初始化
========================= */
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("searchInput").addEventListener("input", (e) => {
    currentKeyword = e.target.value.trim().toLowerCase();
    renderTasks();
  });

  document.getElementById("statusFilter").addEventListener("change", (e) => {
    currentStatus = e.target.value;
    renderTasks();
  });

  refreshTasks();
});

/* =========================
   資料載入
========================= */
async function refreshTasks(){
  const tbody = document.getElementById("taskTableBody");
  tbody.innerHTML = '<tr><td colspan="8" class="empty">載入中...</td></tr>';

  try{
    const res = await fetch(API_LIST);
    const data = await res.json();
    allTasks = Array.isArray(data) ? data : [];

    const months = [...new Set(
      allTasks
        .map(t => t.month)
        .filter(Boolean)
    )].sort().reverse();

    recentMonths = months.slice(0, 3);
    renderMonthTags();
    renderTasks();
  }catch(err){
    console.error("載入任務失敗", err);
    tbody.innerHTML = '<tr><td colspan="8" class="empty">無法載入資料</td></tr>';
  }
}

/* =========================
   月份標籤
========================= */
function renderMonthTags(){

  const recentBox = document.getElementById("recentMonths");
  const dropdown = document.getElementById("monthDropdown");

  recentBox.innerHTML = "";
  dropdown.innerHTML = '<option value="">更多月份</option>';

  /* 取得所有月份 */
  const months = [...new Set(
    allTasks
      .map(t => t.month)
      .filter(Boolean)
  )].sort().reverse();

  /* 最近三個月 */
  const recent = months.slice(0,3);

  /* 其他月份 */
  const old = months.slice(3);

  /* ===== 最近月份 quick tag ===== */
  recent.forEach(m => {

    const count = allTasks.filter(t => t.month === m).length;

    const tag = document.createElement("div");
    tag.className = "month-tag" + (monthFilter === m ? " active" : "");
    tag.textContent = `${m} (${count})`;

    tag.onclick = () => {
      setMonthFilter(m);
    };

    recentBox.appendChild(tag);
  });

  /* ===== dropdown ===== */
  old.forEach(m => {

    const count = allTasks.filter(t => t.month === m).length;

    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = `${m} (${count})`;

    dropdown.appendChild(opt);
  });

}
/* =========================
   狀態判斷
========================= */
function getTaskStatus(task){

  const status = String(task.status || "");

  /* ===== 結案 ===== */
  if (status === "結案") {
    return {
      key: "closed",
      text: "結案",
      className: "status-done"
    };
  }

  /* ===== 簽核中 ===== */
  return {
    key: "progress",
    text: "簽核中",
    className: "status-progress"
  };

}
/* =========================
   篩選後資料
========================= */
function getFilteredTasks(){
  let filtered = allTasks.filter(task => {
    if (monthFilter !== "all") {
      return task.month === monthFilter;
    }
    return recentMonths.includes(task.month);
  });

  if (currentKeyword) {
    filtered = filtered.filter(task => {
      return (
        String(task.task_id || "").toLowerCase().includes(currentKeyword) ||
        String(task.creator || "").toLowerCase().includes(currentKeyword) ||
        String(task.unit || "").toLowerCase().includes(currentKeyword) ||
        String(task.month || "").toLowerCase().includes(currentKeyword)
      );
    });
  }

  if (currentStatus !== "all") {
    filtered = filtered.filter(task => getTaskStatus(task).key === currentStatus);
  }

  filtered.sort((a, b) => {
    const dateA = new Date(a.created_at || 0).getTime();
    const dateB = new Date(b.created_at || 0).getTime();
    return dateB - dateA;
  });

  return filtered;
}

/* =========================
   Render 任務表格
========================= */
function renderTasks(){
  const tbody = document.getElementById("taskTableBody");
  const filtered = getFilteredTasks();

  tbody.innerHTML = "";
  document.getElementById("checkAll").checked = false;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">目前無符合條件的任務</td></tr>';
    updateSelectedCount();
    return;
  }

  filtered.forEach(task => {
    const progress = Number(task.progress || 0);
    const status = getTaskStatus(task);

    const dateObj = new Date(task.created_at);
    const dateStr = isNaN(dateObj.getTime())
      ? "-"
      : dateObj.toLocaleDateString("zh-TW", {
          timeZone: "Asia/Taipei",
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        });

    const timeStr = isNaN(dateObj.getTime())
      ? ""
      : dateObj.toLocaleTimeString("zh-TW", {
          timeZone: "Asia/Taipei",
          hour12: false,
          hour: "2-digit",
          minute: "2-digit"
        });

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="check-col">
        <input type="checkbox" class="row-check" value="${escapeHtml(task.task_id || "")}" onchange="updateSelectedCount()">
      </td>

      <td>
        <div class="task-meta-time">📅 ${dateStr} ${timeStr}</div>
        <div class="task-meta-id">任務編碼：${escapeHtml(task.task_id || "-")}</div>
      </td>

      <td style="font-weight:500;">${escapeHtml(task.creator || "-")}</td>
      <td>${escapeHtml(task.unit || "-")}</td>
      <td>${escapeHtml(task.month || "-")}</td>

/* 將原本那三行刪掉，替換成下面這段 */
function updateSelectedCount() {
  updateUIStats();

  const ids = getSelectedTaskIds();
  const count = ids.length;
  
  const btnReport = document.getElementById("mainDownloadBtn");
  const btnRoster = document.getElementById("rosterDownloadBtn");

    btnReport.innerText = `📥 批次下載簽核紀錄 (${count} 筆)`;

// 處理「簽核紀錄」下載
function handleDownload() {
  const ids = getSelectedTaskIds();
  if (ids.length === 0) {
    alert("請先勾選要下載簽核紀錄的任務");
    return;
  }
  
  if (ids.length === 1) {
    openReport(ids[0]);
  } else {
    downloadSelectedReports();
  }
}

// 處理「當月班表」下載
function handleRosterDownload() {

  const ids = getSelectedTaskIds();

  if (ids.length === 0) {
    alert("請先勾選要下載班表的任務");
    return;
  }

  ids.forEach(id => {

    const task = allTasks.find(t => t.task_id === id);

    if (!task || !task.pdf_file_id) {
      alert("找不到班表 PDF");
      return;
    }

    const url =
      `https://drive.google.com/file/d/${task.pdf_file_id}/preview`;

    window.open(url, "_blank");

  });

}

function copySignLink(taskId){

/* =========================
   批次查看 / 下載
========================= */
function viewSelectedReports(){
  const ids = getSelectedTaskIds();
  if (!ids.length) {
    alert("請先勾選任務");
    return;
  }

  ids.forEach(id => {
    const url = `${API_REPORT}?task_id=${encodeURIComponent(id)}`;
    window.open(url, "_blank");
  });
}

async function downloadSelectedReports(){

  const ids = getSelectedTaskIds();

  if (!ids.length) {
    alert("請先勾選任務");
    return;
  }

  try {

    const res = await fetch(API_BATCH_EXPORT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        task_ids: ids
      })
    });

    if (!res.ok) {
      throw new Error("API error");
    }

    const blob = await res.blob();

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "smartroster_reports.zip";

    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);

  } catch (err) {

    console.error(err);
    alert("下載失敗");

  }

}

/* =========================
   刪除任務
========================= */
async function deleteTask(taskId){
  const confirmText = `確定刪除任務 ${taskId}？\n\n此操作屬高風險，且可能無法復原。`;
  if (!confirm(confirmText)) return;

  try{
    const res = await fetch(API_DELETE, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ task_id: taskId })
    });

    const text = await res.text();
    let data = {};
    try { data = JSON.parse(text); } catch(e) {}

    if (!res.ok) {
      throw new Error(data.message || "刪除失敗");
    }

    alert(`任務 ${taskId} 已刪除`);
    refreshTasks();
  }catch(err){
    console.error(err);
    alert(`刪除失敗：${err.message || "請檢查 roster-delete webhook"}`);
  }
}

async function deleteSelectedTasks(){
  const ids = getSelectedTaskIds();
  if (!ids.length) {
    alert("請先勾選任務");
    return;
  }

  const ok = confirm(
    `確定刪除已勾選的 ${ids.length} 筆任務？\n\n此操作屬高風險，建議後端務必保留刪除紀錄。`
  );
  if (!ok) return;

  let success = 0;
  let fail = 0;

  for (const id of ids) {
    try{
      const res = await fetch(API_DELETE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task_id: id })
      });

      if (res.ok) {
        success++;
      } else {
        fail++;
      }
    }catch(err){
      fail++;
    }
  }

  alert(`批次刪除完成\n成功：${success} 筆\n失敗：${fail} 筆`);
  refreshTasks();
}

/* =========================
   小工具
========================= */
function escapeHtml(str){
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function jsEscape(str){
  return String(str).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
}

async function closeTask(taskId){

  if(!ok) return;

  try{

      headers:{ "Content-Type":"application/json" },

    });

      throw new Error("結案失敗");
    }

    alert("任務已結案並生成PDF");

    refreshTasks();

  }catch(err){

    console.error(err);
    alert("結案失敗");

  }

}


/* =========================

========================= */

async function reopenTask(taskId){

  const ok = confirm(
    `確定要取消結案 ${taskId}？\n\n簽核連結將重新開啟`
  );

  if(!ok) return;

  try{

    const res = await fetch(API_REOPEN,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ task_id:taskId })
    });

    if(!res.ok){
      throw new Error("取消結案失敗");
    }

    alert("任務已重新開啟");

    refreshTasks();

  }catch(err){

    console.error(err);
    alert("取消結案失敗");

  }

}
