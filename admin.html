<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>SmartRoster Admin｜數位行政效率看板</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --primary:#374151;
  --accent:#059669;
  --bg:#eef2f0;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --ok:#059669;
  --warn:#b45309;
  --bad:#b91c1c;
  --info:#2563eb;
}

*{box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:32px;
}

.container{
  max-width:1400px;
  margin:auto;
}

header{
  margin-bottom:24px;
}

header h1{
  margin:0;
  font-size:30px;
}

header p{
  margin-top:6px;
  color:var(--muted);
}

/* 置頂資訊看板樣式 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 24px;
}

.stats-card {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
  border-left: 5px solid var(--primary);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.stats-label {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 6px;
  font-weight: 500;
}

.stats-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
}

.stats-sublabel {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
  margin-bottom:24px;
}

/* 工具列與按鈕 */
.toolbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:18px;
}

.toolbar-left{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

input[type="text"], select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:14px;
  min-width:220px;
  background:#fff;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  font-size:14px;
  cursor:pointer;
  transition: background 0.2s;
}

button.primary{ background:var(--primary); color:#fff; }
button.accent{ background:var(--accent); color:#fff; }
button.secondary{ background:#f3f4f6; color:#374151; border:1px solid #d1d5db; }
button.danger{ background:var(--bad); color:#fff; }

/* Table 樣式 */
.table-wrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius:14px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1100px;
  background:#fff;
}

th,td{
  padding:14px 12px;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

th{
  color:var(--muted);
  background:#fafafa;
  position:sticky;
  top:0;
  z-index:1;
}

.task-meta-time{
  font-size:12px;
  font-weight:600;
  color:#065f46;
  background:#ecfdf5;
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  margin-bottom:6px;
}

.progress{
  background:#e5e7eb;
  border-radius:999px;
  height:12px;
  overflow:hidden;
  margin-bottom:6px;
  width:110px;
}

.progress-bar{
  background:var(--accent);
  height:100%;
}

.status-badge{
  font-size:12px;
  padding:4px 8px;
  border-radius:999px;
  font-weight:600;
}

.status-done{ background:#eff6ff; color:#1d4ed8; }
.status-progress{ background:#ecfdf5; color:#065f46; }
.status-pending{ background:#f3f4f6; color:#4b5563; }

/* Modal 略 (保持原樣) */
.modal{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-box{ background:#fff; border-radius:16px; width:min(1000px,92vw); max-height:88vh; overflow:hidden; }
.modal-header{ padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-body{ padding:20px 22px; overflow:auto; max-height:calc(88vh - 70px); }

@media (max-width: 900px){
  body{ padding:16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .toolbar{ flex-direction:column; }
}
</style>
</head>

<body>
<div class="container">

<header>
  <h1>SmartRoster Admin</h1>
  <p>智慧班表簽核系統｜後台管理</p>
</header>

<div class="stats-grid">
  <div class="stats-card">
    <div class="stats-label">累計起單總數</div>
    <div id="statTotal" class="stats-value">0</div>
  </div>
  <div class="stats-card">
    <div class="stats-label">應簽核總人次</div>
    <div id="statSigners" class="stats-value">0</div>
  </div>
  <div class="stats-card">
    <div class="stats-label">全案總達成率</div>
    <div id="statTotalRate" class="stats-value" style="color:var(--ok);">0%</div>
  </div>
  <div class="stats-card">
    <div class="stats-label">數位行政效率</div>
    <div id="statEfficiency" class="stats-value" style="color:var(--info);">0%</div>
    <div class="stats-sublabel">24小時達成率 > 80% 任務比</div>
  </div>
</div>

<div class="card">
  <div class="toolbar">
    <div class="toolbar-left">
      <input id="searchInput" type="text" placeholder="搜尋關鍵字..." />
      <select id="statusFilter">
        <option value="all">全部狀態</option>
        <option value="pending">未開始</option>
        <option value="progress">進行中</option>
        <option value="done">已完成</option>
      </select>
      <button class="secondary" onclick="refreshTasks()">重新整理</button>
    </div>
    <div class="toolbar-right">
      <div id="monthTags" class="month-tags"></div>
    </div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
    <button id="mainDownloadBtn" class="accent" onclick="handleDownload()">📥 下載簽核紀錄</button>
    <button id="rosterDownloadBtn" class="primary" onclick="handleRosterDownload()">📅 下載當月班表</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:48px;text-align:center;">
            <input type="checkbox" id="checkAll" onclick="toggleAllRows(this)">
          </th>
          <th>任務編碼 / 時間</th>
          <th>建立者</th>
          <th>單位</th>
          <th>簽核月份</th>
          <th>狀態</th>
          <th>完成度</th>
          <th>功能</th>
        </tr>
      </thead>
      <tbody id="taskTableBody">
        <tr><td colspan="8" class="empty">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

</div>

<div class="modal" id="detailModal">...</div>

<script>
/* =========================
   1. 配置與全域狀態
========================= */
const API_LIST = "https://chihwei-n8n.zeabur.app/webhook/roster-list";
const API_REPORT = "https://chihwei-n8n.zeabur.app/webhook/roster-report";
const API_DETAIL = "https://chihwei-n8n.zeabur.app/webhook/roster-task-detail";
const API_EXPORT = "https://chihwei-n8n.zeabur.app/webhook/roster-export";

let allTasks = [];
let monthFilter = "all";
let recentMonths = [];
let currentKeyword = "";
let currentStatus = "all";

/* =========================
   2. UI 與 看板計算
========================= */
function updateUI() {
  const ids = getSelectedTaskIds();
  const count = ids.length;

  // 更新下載按鈕文字
  const btnReport = document.getElementById("mainDownloadBtn");
  const btnRoster = document.getElementById("rosterDownloadBtn");
  
  if (count === 0) {
    btnReport.innerText = "📥 下載簽核紀錄";
    btnRoster.innerText = "📅 下載當月班表";
  } else if (count === 1) {
    btnReport.innerText = "📥 下載簽核紀錄 (單筆)";
    btnRoster.innerText = "📅 下載當月班表 (單筆)";
  } else {
    btnReport.innerText = `📥 批次下載簽核紀錄 (${count} 筆)`;
    btnRoster.innerText = `📥 批次下載當月班表 (${count} 筆)`;
  }

  // 計算看板數據 (固定顯示總體數據)
  const totalTasks = allTasks.length;
  const totalSigners = allTasks.reduce((acc, t) => acc + Number(t.signer_count || 0), 0);
  const totalSigned = allTasks.reduce((acc, t) => acc + Number(t.signed_count || 0), 0);
  const highEffTasks = allTasks.filter(t => Number(t.progress || 0) >= 80).length;

  document.getElementById("statTotal").innerText = totalTasks;
  document.getElementById("statSigners").innerText = totalSigners;
  document.getElementById("statTotalRate").innerText = totalSigners > 0 
    ? Math.round((totalSigned / totalSigners) * 100) + "%" : "0%";
  document.getElementById("statEfficiency").innerText = totalTasks > 0 
    ? Math.round((highEffTasks / totalTasks) * 100) + "%" : "0%";
}

/* =========================
   3. 下載處理
========================= */
function handleDownload() {
  const ids = getSelectedTaskIds();
  if (ids.length === 0) return alert("請先勾選任務");
  
  if (ids.length === 1) {
    window.open(`${API_REPORT}?task_id=${encodeURIComponent(ids[0])}`, "_blank");
  } else {
    // 批次下載處理 (可呼叫原本的 downloadSelectedReports 邏輯)
    ids.forEach(id => window.open(`${API_REPORT}?task_id=${encodeURIComponent(id)}`, "_blank"));
  }
}

function handleRosterDownload() {
  const ids = getSelectedTaskIds();
  if (ids.length === 0) return alert("請先勾選任務");
  ids.forEach(id => window.open(`${API_EXPORT}?task_id=${encodeURIComponent(id)}`, "_blank"));
}

/* =========================
   4. 表格渲染與過濾 (修正後的版本)
========================= */
function renderTasks() {
  const tbody = document.getElementById("taskTableBody");
  const filtered = getFilteredTasks();

  tbody.innerHTML = "";
  document.getElementById("checkAll").checked = false;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">目前無符合條件的任務</td></tr>';
    updateUI();
    return;
  }

  filtered.forEach(task => {
    const progress = Number(task.progress || 0);
    const status = getTaskStatus(task);
    const dateObj = new Date(task.created_at);
    
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="text-align:center;">
        <input type="checkbox" class="row-check" value="${task.task_id}" onchange="updateUI()">
      </td>
      <td>
        <div class="task-meta-time">📅 ${dateObj.toLocaleDateString()}</div>
        <div style="font-size:12px;color:var(--muted);">ID: ${task.task_id}</div>
      </td>
      <td style="font-weight:500;">${task.creator || "-"}</td>
      <td>${task.unit || "-"}</td>
      <td>${task.month || "-"}</td>
      <td><span class="status-badge ${status.className}">${status.text}</span></td>
      <td>
        <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
        <div style="font-size:11px;">${progress}% (${task.signed_count}/${task.signer_count})</div>
      </td>
      <td>
        <div class="row-actions">
          <button class="secondary" onclick="viewTaskDetail('${task.task_id}')">內容</button>
          <button class="secondary" onclick="copyLink('${task.task_id}')">連結</button>
          <button class="danger" onclick="deleteTask('${task.task_id}')">刪除</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });

  updateUI();
}

// 其餘輔助函式 (getFilteredTasks, toggleAllRows, getSelectedTaskIds...) 保持邏輯即可
function getSelectedTaskIds(){ return [...document.querySelectorAll(".row-check:checked")].map(el => el.value); }
function toggleAllRows(source){ document.querySelectorAll(".row-check").forEach(el => el.checked = source.checked); updateUI(); }
function getTaskStatus(task){ 
  const p = Number(task.progress || 0);
  if (p >= 100) return { text: "已完成", className: "status-done" };
  if (p > 0) return { text: "進行中", className: "status-progress" };
  return { text: "未開始", className: "status-pending" };
}

// 初始化與 API 載入 (略，保持原本 refreshTasks 邏輯)
async function refreshTasks(){
  const tbody = document.getElementById("taskTableBody");
  tbody.innerHTML = '<tr><td colspan="8" class="empty">載入中...</td></tr>';
  try{
    const res = await fetch(API_LIST);
    const data = await res.json();
    allTasks = Array.isArray(data) ? data : [];
    renderMonthTags();
    renderTasks();
  }catch(e){ tbody.innerHTML = '<tr><td colspan="8" class="empty">連線失敗</td></tr>'; }
}

function renderMonthTags(){ /* 原本的邏輯... */ }
function getFilteredTasks(){ /* 原本的過濾邏輯... */ }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }
function jsEscape(s){ return String(s).replace(/'/g, "\\'"); }

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("searchInput").addEventListener("input", e => { currentKeyword = e.target.value.toLowerCase(); renderTasks(); });
  document.getElementById("statusFilter").addEventListener("change", e => { currentStatus = e.target.value; renderTasks(); });
  refreshTasks();
});
</script>
</body>
</html>
