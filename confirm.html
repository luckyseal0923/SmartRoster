<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>班表確認</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 16px;
    color: #1f2937;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  h2 {
    margin: 0 0 12px;
    text-align: center;
  }

  h3 {
    margin: 0 0 12px;
    font-size: 16px;
    color: #374151;
  }

  /* ===== 查詢列 ===== */
  .search-row {
    display: flex;
    gap: 8px;
  }

  .search-row input {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
  }

  .search-row button {
    padding: 12px 18px;
    font-size: 15px;
    border-radius: 10px;
    border: none;
    background: #2563eb;
    color: white;
    font-weight: 600;
  }

  /* ===== 人員資訊 ===== */
  .info-grid {
    display: grid;
    grid-template-columns: 80px 1fr;
    row-gap: 8px;
    column-gap: 12px;
    font-size: 15px;
  }

  .info-label {
    color: #6b7280;
  }

  /* ===== 班表表格 ===== */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }

  thead {
    background: #f1f5f9;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #e5e7eb;
    text-align: center;
  }

  th {
    font-weight: 600;
    color: #374151;
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  /* ===== 簽核按鈕 ===== */
  .action-btn {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: #16a34a;
    color: white;
    font-weight: 700;
  }

  .hidden {
    display: none;
  }
</style>
</head>

<body>

<div class="container">

  <!-- 查詢 -->
  <div class="card">
    <h2>班表確認</h2>
<div id="taskDisplay" style="text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 12px;">
  任務載入中...
</div>
    <div class="search-row">
      <input id="staffId" placeholder="請輸入員編" />
      <button onclick="lookup()">查詢班表</button>
    </div>
  </div>

  <!-- 查詢結果 -->
  <div class="card hidden" id="resultCard">

    <!-- 人員資訊 -->
    <h3>簽核人資料</h3>
    <div class="info-grid">
      <div class="info-label">姓名</div>
      <div id="name"></div>
      <div class="info-label">員編</div>
      <div id="staff"></div>
    </div>

    <!-- 班表 -->
<h3 style="margin-top:16px;" id="scheduleTitle">
  班表內容
</h3>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>班別</th>
          <th>備註</th>
        </tr>
      </thead>
      <tbody id="scheduleTable"></tbody>
    </table>

    <button class="action-btn" onclick="goSign()">
      確認並簽核
    </button>
  </div>

</div>

<script>
// 📍 1. 抓取 URL 中的 task_id (例如：confirm.html?id=task-202603-XXX)
const urlParams = new URLSearchParams(window.location.search);
const taskId = urlParams.get('id');

let currentStaffId = "";

// 📍 2. 頁面載入檢查
window.onload = function() {

  const display = document.getElementById("taskDisplay");

  if (!taskId) {
    display.innerHTML = "<b style='color:red;'>錯誤：缺少任務 ID，請洽單位主管。</b>";
    document.querySelector(".search-row button").disabled = true;
    return;
  }

  display.innerText = `任務編號：${taskId}`;

  /* ===== 從 taskId 解析簽核月份 ===== */

  // task-202604-L9B
  const match = taskId.match(/task-(\d{6})/);

  if (match) {

    const ym = match[1];   // 202604

    const year = ym.substring(0,4);
    const month = parseInt(ym.substring(4,6),10);

    const title = document.getElementById("scheduleTitle");

    if (title) {
      title.innerText = `班表內容｜${year}年${month}月`;
    }

  }

};

// 📍 3. 查詢班表函數
async function lookup() {
  const staffIdInput = document.getElementById("staffId").value.trim();
  if (!staffIdInput) return alert("請輸入員編");

  const btn = document.querySelector(".search-row button");
  btn.innerText = "查詢中...";
  btn.disabled = true;

  try {
    const res = await fetch(`https://chihwei-n8n.zeabur.app/webhook/Staff-check-roster?taskId=${taskId}&staffId=${encodeURIComponent(staffIdInput)}`);
    if (!res.ok) throw new Error("查無此員編或任務已過期");

    const record = await res.json();
    currentStaffId = staffIdInput;

    document.getElementById("name").innerText = record.name || "未定義";
    document.getElementById("staff").innerText = record.staff_id || staffIdInput;

    const tbody = document.getElementById("scheduleTable");
    tbody.innerHTML = "";

// 顯示簽核月份
if (record.sign_month) {
  const ym = String(record.sign_month);

  let year, month;

  if (ym.includes("-")) {
    [year, month] = ym.split("-");
  } else {
    year = ym.substring(0,4);
    month = ym.substring(4,6);
  }

  month = parseInt(month,10);

  document.getElementById("scheduleTitle").innerText =
    `班表內容｜${year}年${month}月`;
}

// 日期排序（小到大）
if (Array.isArray(record.schedule) && record.schedule.length > 0) {

  record.schedule.sort((a, b) => {
    return Number(a.date) - Number(b.date);
  });

  record.schedule.forEach(entry => {
        tbody.innerHTML += `
          <tr>
            <td>${entry.date}</td>
            <td>${entry.shift}</td>
            <td>${entry.note || "-"}</td>
          </tr>`;
      });
    } else {
      tbody.innerHTML = "<tr><td colspan='3'>尚無班表資料</td></tr>";
    }

    document.getElementById("resultCard").classList.remove("hidden");
  } catch (err) {
    alert(err.message || "查詢失敗，請稍後再試");
    document.getElementById("resultCard").classList.add("hidden");
  } finally {
    btn.innerText = "查詢班表";
    btn.disabled = false;
  }
}

// 📍 4. 前往簽核頁面
function goSign() {
  if (!currentStaffId || !taskId) return alert("資料不完整");
  // 帶著 ID 前往簽名頁
  location.href = `sign.html?id=${taskId}&staffId=${encodeURIComponent(currentStaffId)}`;
}
</script>

</body>
</html>
