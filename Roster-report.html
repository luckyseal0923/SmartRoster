<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>同仁簽核匯總報告</title>
    <style>
        body { font-family: "Noto Sans TC", sans-serif; padding: 40px; color: #333; }
        h1 { text-align: center; color: #1a56db; }
        .report-info { text-align: right; margin-bottom: 20px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        th { background-color: #f8fafc; font-weight: 600; }
        .signature-img { max-height: 60px; display: block; margin: 0 auto; }
        .status-signed { color: #059669; font-weight: bold; }
        @media print {
            .no-print { display: none; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

    <h1>班表簽核匯總報告</h1>
    <div class="report-info">
        列印時間：{{ $now.format('YYYY-MM-DD HH:mm') }}
    </div>

    <table>
        <thead>
            <tr>
                <th>任務編號 (Task ID)</th>
                <th>員工編號 (Staff ID)</th>
                <th>同仁姓名</th>
                <th>簽核狀態</th>
                <th>簽核時間</th>
                <th>電子簽名檔</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ $json.task_id }}</td>
                <td>{{ $json.staff_id }}</td>
                <td>{{ $json.name }}</td>
                <td class="status-signed">已完成簽核</td>
                <td>{{ $json.signed_at }}</td>
                <td>
                    <img src="{{ $json.schedule_json }}" class="signature-img" alt="簽名檔">
                </td>
            </tr>
        </tbody>
    </table>

    <div class="no-print" style="margin-top: 30px; text-align: center;">
        <button onclick="window.print()" style="padding: 10px 20px; cursor: pointer;">列印此報告</button>
    </div>

</body>
</html>
